apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
  namespace: grounded-rag
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: grounded-rag
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  strategy: { type: Recreate }   # single writer on an RWO volume
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          envFrom:
            - secretRef: { name: rag-db }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "rag"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: grounded-rag
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
