apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: grounded-rag
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: grounded-rag-web:local
          imagePullPolicy: IfNotPresent
          env:
            # The browser talks to the API through the port-forward / ingress, not the
            # in-cluster Service name. Point this at however you expose the API.
            - name: VITE_API_URL
              value: "http://localhost:8000"
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: grounded-rag
spec:
  selector: { app: web }
  ports:
    - port: 5173
      targetPort: 5173
