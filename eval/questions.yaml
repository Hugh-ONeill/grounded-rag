# ---- Conversational follow-ups (history -> condense -> route) ----
# Each item's `history` is a prior transcript; the harness condenses the follow-up
# into a standalone question first, then scores retrieval as usual. Scored as a
# separate "Follow-up hit-rate" row.
- question: "What about Gholdengo?"
  history:
    - role: user
      content: "What item does Kingambit most commonly run in Gen 9 OU?"
    - role: assistant
      content: "In Gen 9 OU, Kingambit most commonly holds Leftovers [1]."
  expect_source: "gen9ou_chaos#Gholdengo"
  expect_keywords: ["balloon"]

- question: "What moves does it usually run?"
  history:
    - role: user
      content: "Which item does Dragapult run most often?"
    - role: assistant
      content: "In Gen 9 OU, Dragapult most often runs Choice Specs [1]."
  expect_source: "gen9ou_chaos#Dragapult"
  expect_keywords: []

# referent lives in the ASSISTANT turn, not the user's question
- question: "What item does it usually hold?"
  history:
