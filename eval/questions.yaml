# Gold questions for grounded-rag, grounded in real gen9ou_chaos.json usage data.
# Keywords are deliberately short substrings so they match whether the model writes
# "boosterenergy" (raw) or "Booster Energy" (normalized).
#   expect_source   : substring that should appear in a retrieved chunk's source (retrieval check)
#   expect_keywords : terms the answer should contain (faithfulness proxy); [] = retrieval-only
#   no_answer: true : corpus should NOT answer -> tests the "I don't know" gate

